<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TenantCore - WebAssembly</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <div style="background: white; padding: 2rem 4rem; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center;">
                <svg width="60" height="60" viewBox="0 0 24 24" style="animation: spin 1s linear infinite; margin-bottom: 1rem;">
                    <circle cx="12" cy="12" r="10" stroke="#667eea" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="31.4 31.4" />
                </svg>
                <h3 style="margin: 0; color: #333; font-family: 'Roboto', sans-serif;">Loading TenantCore...</h3>
                <p style="margin: 0.5rem 0 0 0; color: #666; font-family: 'Roboto', sans-serif; font-size: 0.9rem;">WebAssembly Edition</p>
            </div>
        </div>
        <style>
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
        </style>
    </div>

    <div id="blazor-error-ui" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #ffdddd; padding: 0.5rem; text-align: center;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss" style="cursor: pointer; margin-left: 1rem;">??</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>
</html>
